<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Mobius Muse | Teacher Information</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<div class="header">

<h1>MOBIUS MUSE</h1>

<h2>Blueprint School Data Intake Form</h2>

<p id="teacherTitle">

Teacher Information

</p>

<div class="page-number">

Page 4 of 12

</div>

</div>

<div class="progress-container">

<div class="progress-bar"
style="width:80%;"></div>

</div>

<form id="teacherForm">

<h3 id="teacherHeading">

Teacher 1

</h3>

<div class="section">

<label>

Teacher Full Name

</label>

<input
type="text"
id="teacherName"
placeholder="Enter teacher's full name"
required>

</div>

<div class="section">

<label>

TSC Number (Optional)

</label>

<input
type="text"
id="tscNumber"
placeholder="Enter TSC Number">

</div>

<div class="section">

<label>

Employment Type

</label>

<select id="employmentType" required>

<option value="">

Select Employment Type

</option>

<option>

Permanent

</option>

<option>

BOM

</option>

<option>

Intern

</option>

<option>

Contract

</option>

</select>

</div>

<div class="section">

<label>

Maximum Lessons Per Week

</label>

<input
type="number"
id="maximumLessons"
min="1"
placeholder="Example: 35"
required>

  </div>

  <hr>

<h3>Teaching Information</h3>

<div class="section">

<label>
Subjects Taught
</label>

<div class="checkbox-group">

<label><input type="checkbox" value="English"> English</label>

<label><input type="checkbox" value="Kiswahili"> Kiswahili</label>

<label><input type="checkbox" value="Mathematics"> Mathematics</label>

<label><input type="checkbox" value="Science & Technology"> Science & Technology</label>

<label><input type="checkbox" value="Integrated Science"> Integrated Science</label>

<label><input type="checkbox" value="Agriculture & Nutrition"> Agriculture & Nutrition</label>

<label><input type="checkbox" value="Social Studies"> Social Studies</label>

<label><input type="checkbox" value="Creative Arts"> Creative Arts</label>

<label><input type="checkbox" value="Pre-Technical Studies"> Pre-Technical Studies</label>

<label><input type="checkbox" value="CRE"> CRE</label>

<label><input type="checkbox" value="PPI"> PPI</label>

</div>

</div>

<div class="section">

<label>

Grades Taught

</label>

<div class="checkbox-group">

<label><input type="checkbox" value="Grade 4"> Grade 4</label>

<label><input type="checkbox" value="Grade 5"> Grade 5</label>

<label><input type="checkbox" value="Grade 6"> Grade 6</label>

<label><input type="checkbox" value="Grade 7"> Grade 7</label>

<label><input type="checkbox" value="Grade 8"> Grade 8</label>

<label><input type="checkbox" value="Grade 9"> Grade 9</label>

</div>

</div>

<hr>

<div class="section">

<label>

Specialist Teacher

</label>

<select id="specialistTeacher">

<option value="No">

No

</option>

<option value="Yes">

Yes

</option>

</select>

</div>

<div class="buttons">

<button
type="button"
onclick="window.location.href='page3.html'">

Previous

</button>

<button
type="button"
id="saveTeacher">

Next Teacher

</button>

</div>

</form>

</div>

<script src="script.js"></script>

</body>

  </html>
